name: Deploy to DO

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

          # Rsync source to server (no node_modules, no .next, no .env)
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.next' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ $DO_USER@$DO_HOST:/var/www/twentyfivefilms/

          # Build and restart on server (DB is available there for prisma generate --sql)
          ssh -i ~/.ssh/deploy_key $DO_USER@$DO_HOST << 'ENDSSH'
            cd /var/www/twentyfivefilms
            npm ci
            npm run build
            npx prisma migrate deploy
            pm2 describe twentyfivefilms > /dev/null 2>&1 \
              && pm2 restart twentyfivefilms \
              || pm2 start npm --name twentyfivefilms -- start
            pm2 save
          ENDSSH
